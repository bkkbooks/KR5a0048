body:
  text: 太上元始天尊說續命妙經爾時元始天尊告太上道君曰三界衆生漂流苦海无有解脫汝豈忍受宜須精勤奉行我法普該救度太上道君既奉告命不敢藏情若有衆生危厄疾病當誦此經稱大慈大悲大惠眞人大慈大悲救苦眞人即得離苦長得解脫永離嬰纏長生益壽老命更延一切厄難皆得消滅太上道君宣說頌曰大慈二眞人能救三界苦放光照世間地獄悉停住刀山髙巍巍鑊湯飛炎炎至心念眞人罪魂解宿𡨚疾病多苦厄非災難可言痛哉傷五神眞人愍悲辛清信善男女歸命須至心常念二眞人離苦免憂沈疾病消衆厄邪魔不敢侵畫夜心不離解脫全爾身勇猛發回向同歸七寳林太上元始天尊說續命妙經
